name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: aib_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('docker/app/Dockerfile', 'composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/app/Dockerfile
          load: true
          tags: aib-app
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: docker run --rm -v "$PWD":/var/www/html -w /var/www/html aib-app php artisan key:generate

      - name: Run Pint (code style)
        run: |
          docker run --rm -v "$PWD":/var/www/html -w /var/www/html aib-app \
            ./vendor/bin/pint --test

      - name: Run Larastan
        run: |
          docker run --rm -v "$PWD":/var/www/html -w /var/www/html aib-app \
            ./vendor/bin/phpstan analyse --no-progress

      - name: Run Pest
        run: |
          docker run --rm \
            -v "$PWD":/var/www/html \
            -w /var/www/html \
            --network host \
            -e APP_ENV=testing \
            -e DB_CONNECTION=pgsql \
            -e DB_HOST=127.0.0.1 \
            -e DB_PORT=5432 \
            -e DB_DATABASE=aib_test \
            -e DB_USERNAME=postgres \
            -e DB_PASSWORD=secret \
            -e REDIS_HOST=127.0.0.1 \
            -e REDIS_PORT=6379 \
            -e QUEUE_CONNECTION=sync \
            -e CACHE_STORE=array \
            aib-app ./vendor/bin/pest --no-coverage

  deploy:
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('docker/app/Dockerfile', 'composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/app/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/app:latest
            ghcr.io/${{ github.repository }}/app:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /opt/aib
            git pull origin master

            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            APP_IMAGE=ghcr.io/${{ github.repository }}/app:${{ github.sha }} \
              docker compose -f docker-compose.prod.yml pull app horizon

            APP_IMAGE=ghcr.io/${{ github.repository }}/app:${{ github.sha }} \
              docker compose -f docker-compose.prod.yml up -d --no-build --remove-orphans

            docker compose -f docker-compose.prod.yml exec -T app \
              php artisan migrate --force

            docker compose -f docker-compose.prod.yml exec -T app \
              php artisan optimize

            docker image prune -f
